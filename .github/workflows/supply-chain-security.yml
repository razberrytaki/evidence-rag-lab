name: Supply Chain Security

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  socket-firewall:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.28.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm install -g sfw
      - run: sfw pnpm install --frozen-lockfile
